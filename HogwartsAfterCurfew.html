<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hogwarts: After Curfew</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #04060e; }
  body { font-family: Georgia, 'Times New Roman', serif; color: #e8dcbe; }
  #scene { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #hud { position: absolute; inset: 0; pointer-events: none; user-select: none; }

  #crosshair {
    position: absolute; left: 50%; top: 50%; width: 6px; height: 6px;
    margin: -3px 0 0 -3px; border-radius: 50%;
    background: rgba(232, 220, 190, 0.85);
    box-shadow: 0 0 6px rgba(232, 220, 190, 0.6);
  }

  #objective {
    position: absolute; top: 24px; left: 24px; max-width: 420px;
    padding: 12px 16px; font-size: 15px; line-height: 1.45;
    background: rgba(8, 10, 22, 0.62); border: 1px solid rgba(201, 165, 69, 0.45);
    border-radius: 4px; letter-spacing: 0.02em;
    text-shadow: 0 1px 2px #000;
  }
  #objective .head {
    font-size: 11px; letter-spacing: 0.28em; color: #c9a545;
    text-transform: uppercase; margin-bottom: 5px;
  }
  #objective b { color: #ffe9a8; font-weight: normal; }

  #caption {
    position: absolute; bottom: 128px; left: 50%; transform: translateX(-50%);
    max-width: 640px; padding: 8px 18px; text-align: center;
    font-size: 17px; font-style: italic; color: #f3ead2;
    text-shadow: 0 1px 3px #000, 0 0 18px rgba(0,0,0,0.9);
    opacity: 0; transition: opacity 0.4s;
  }

  #prompt {
    position: absolute; bottom: 190px; left: 50%; transform: translateX(-50%);
    font-size: 14px; color: #d8cba1; letter-spacing: 0.05em;
    padding: 5px 14px; background: rgba(8, 10, 22, 0.55);
    border: 1px solid rgba(201, 165, 69, 0.35); border-radius: 3px;
    opacity: 0; transition: opacity 0.15s;
    text-shadow: 0 1px 2px #000;
  }
  #prompt .key {
    display: inline-block; border: 1px solid #c9a545; border-radius: 3px;
    padding: 0 6px; margin-right: 6px; color: #ffe9a8; font-size: 12px;
  }

  #spellbar {
    position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px;
  }
  .slot {
    width: 106px; padding: 8px 0 7px; text-align: center;
    background: rgba(8, 10, 22, 0.66); border: 1px solid rgba(201, 165, 69, 0.3);
    border-radius: 4px; transition: border-color 0.15s, background 0.15s, transform 0.15s;
  }
  .slot .key {
    font-size: 10px; letter-spacing: 0.2em; color: #8d7f5c; display: block; margin-bottom: 3px;
  }
  .slot .name { font-size: 11.5px; color: #cfc19b; letter-spacing: 0.03em; }
  .slot.sel {
    border-color: #e5c56b; background: rgba(38, 30, 12, 0.8); transform: translateY(-3px);
    box-shadow: 0 0 14px rgba(201, 165, 69, 0.25);
  }
  .slot.sel .name { color: #ffe9a8; }
  .slot.lit .name::after { content: ' ✦'; color: #bfe0ff; }

  #points {
    position: absolute; top: 24px; right: 24px; text-align: right;
    padding: 10px 16px; background: rgba(8, 10, 22, 0.62);
    border: 1px solid rgba(201, 165, 69, 0.45); border-radius: 4px;
    text-shadow: 0 1px 2px #000;
  }
  #points .head {
    font-size: 11px; letter-spacing: 0.28em; color: #d3352b;
    text-transform: uppercase; margin-bottom: 3px;
  }
  #points .val { font-size: 22px; color: #ffe9a8; transition: color 0.3s; }
  #points.gain .val { color: #7fe08a; }
  #points.loss .val { color: #ff7a6b; }

  #map {
    position: absolute; inset: 0; display: none; z-index: 4;
    align-items: center; justify-content: center;
    background: rgba(4, 5, 12, 0.45);
  }
  #map.show { display: flex; }
  #map canvas {
    border-radius: 3px;
    box-shadow: 0 12px 60px rgba(0, 0, 0, 0.75);
    transform: rotate(-0.6deg);
  }

  #langpick {
    position: absolute; inset: 0; display: none; pointer-events: auto; z-index: 6;
    align-items: center; justify-content: center; text-align: center;
    background: radial-gradient(ellipse at center, rgba(9, 12, 26, 0.96) 0%, rgba(2, 3, 8, 0.99) 100%);
  }
  #langpick.show { display: flex; }
  #langpick .crest { font-size: 40px; margin-bottom: 14px; }
  #langpick .lq { color: #9a8d6a; font-style: italic; font-size: 15px; margin-bottom: 26px; }
  #langpick .langs { display: flex; gap: 14px; justify-content: center; }
  #langpick button {
    font-family: Georgia, serif; cursor: pointer; padding: 13px 34px;
    background: rgba(10, 12, 24, 0.8); border: 1px solid rgba(201, 165, 69, 0.55);
    border-radius: 5px; color: #ffe9a8; font-size: 16px; letter-spacing: 0.05em;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  #langpick button:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 22px rgba(201, 165, 69, 0.3);
  }

  #cloakfx {
    position: absolute; inset: 0; opacity: 0; transition: opacity 0.9s; pointer-events: none;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 52%, rgba(190, 214, 234, 0.16) 100%),
      linear-gradient(115deg, rgba(190, 214, 234, 0.05), rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(190, 214, 234, 0.05));
  }
  #cloakfx.show { opacity: 1; animation: cloakshimmer 5s ease-in-out infinite; }
  @keyframes cloakshimmer { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }

  #chill {
    position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 34%, rgba(10, 18, 34, 0.85) 100%),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(180, 210, 255, 0.14) 100%);
  }
  #faint {
    position: absolute; inset: 0; background: #000; opacity: 0;
    transition: opacity 1.1s; display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-style: italic; color: #cfc19b;
  }

  #overlay {
    position: absolute; inset: 0; pointer-events: auto; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(9, 12, 26, 0.88) 0%, rgba(2, 3, 8, 0.97) 100%);
    text-align: center; transition: opacity 0.7s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay .crest { font-size: 44px; margin-bottom: 10px; }
  #overlay h1 {
    font-size: 44px; font-weight: normal; letter-spacing: 0.22em; color: #e8d9a8;
    text-shadow: 0 0 30px rgba(201, 165, 69, 0.35); margin-bottom: 6px;
  }
  #overlay h2 {
    font-size: 15px; font-weight: normal; font-style: italic; letter-spacing: 0.12em;
    color: #8d7f5c; margin-bottom: 34px;
  }
  #overlay .controls {
    font-size: 14px; line-height: 2.1; color: #b7aa85; margin-bottom: 36px;
  }
  #overlay .controls .key {
    display: inline-block; min-width: 26px; padding: 1px 7px; margin: 0 3px;
    border: 1px solid rgba(201, 165, 69, 0.55); border-radius: 4px;
    color: #ffe9a8; font-size: 12px;
  }
  #overlay .enter {
    font-size: 17px; letter-spacing: 0.3em; color: #ffe9a8; text-transform: uppercase;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
  #overlay .fine { position: absolute; bottom: 18px; font-size: 11px; color: #5a5341; font-style: italic; }

  #sorting {
    position: absolute; inset: 0; display: none; pointer-events: auto; z-index: 5;
    align-items: center; justify-content: center; text-align: center;
    background: radial-gradient(ellipse at center, rgba(12, 9, 24, 0.94) 0%, rgba(3, 2, 8, 0.98) 100%);
  }
  #sorting.show { display: flex; }
  #sorting .hat { font-size: 52px; margin-bottom: 6px; }
  #sorting h1 {
    font-size: 34px; font-weight: normal; letter-spacing: 0.18em; color: #e8d9a8;
    margin-bottom: 8px;
  }
  #sorting .quote {
    font-style: italic; color: #9a8d6a; font-size: 15px; margin-bottom: 30px;
  }
  #sorting .houses {
    display: grid; grid-template-columns: repeat(2, 210px); gap: 14px;
    justify-content: center; margin-bottom: 18px;
  }
  #sorting .house {
    font-family: Georgia, serif; cursor: pointer;
    padding: 14px 0 12px; background: rgba(10, 12, 24, 0.8);
    border: 1px solid var(--hc); border-radius: 5px; color: #e8dcbe;
    font-size: 17px; letter-spacing: 0.06em;
    transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
  }
  #sorting .house span { display: block; font-size: 11.5px; font-style: italic; color: var(--hc); margin-top: 3px; }
  #sorting .house:hover {
    transform: translateY(-3px); background: rgba(22, 24, 40, 0.9);
    box-shadow: 0 4px 22px color-mix(in srgb, var(--hc) 45%, transparent);
  }
  #sorting .hatpick {
    display: inline-block; width: auto; padding: 9px 26px; font-size: 13.5px;
    font-style: italic; --hc: #8d7f5c;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div id="hud">
  <div id="crosshair"></div>
  <div id="objective"><div class="head" id="objhead">Objective</div><div id="objtext"></div></div>
  <div id="points"><div class="head">Gryffindor</div><div class="val" id="pointsval">50</div></div>
  <div id="prompt"></div>
  <div id="caption"></div>
  <div id="spellbar">
    <div class="slot" data-i="0"><span class="key">1</span><span class="name">Lumos</span></div>
    <div class="slot" data-i="1"><span class="key">2</span><span class="name">Nox</span></div>
    <div class="slot" data-i="2"><span class="key">3</span><span class="name">Alohomora</span></div>
    <div class="slot" data-i="3"><span class="key">4</span><span class="name">Incendio</span></div>
    <div class="slot" data-i="4"><span class="key">5</span><span class="name">Aguamenti</span></div>
    <div class="slot" data-i="5"><span class="key">6</span><span class="name">Wing. Leviosa</span></div>
    <div class="slot" data-i="6"><span class="key">0</span><span class="name">Exp. Patronum</span></div>
  </div>
  <div id="map"><canvas id="mapcanvas"></canvas></div>
  <div id="cloakfx"></div>
  <div id="chill"></div>
  <div id="faint"><span id="fainttext"></span></div>
  <div id="overlay">
    <div class="crest">⚡</div>
    <h1>HOGWARTS</h1>
    <h2 id="subtitle">— After Curfew —</h2>
    <div class="controls" id="controls"></div>
    <div class="enter" id="enterhint">Click to sneak in</div>
    <div class="fine" id="fineprint"></div>
  </div>
  <div id="sorting">
    <div>
      <div class="hat">🎩</div>
      <h1 id="sortTitle">THE SORTING HAT</h1>
      <p class="quote" id="sortQuote"></p>
      <div class="houses">
        <button class="house" data-house="0" style="--hc:#d3352b">Gryffindor<span>the brave</span></button>
        <button class="house" data-house="1" style="--hc:#2fae66">Slytherin<span>the cunning</span></button>
        <button class="house" data-house="2" style="--hc:#3a6bd8">Ravenclaw<span>the wise</span></button>
        <button class="house" data-house="3" style="--hc:#e8c832">Hufflepuff<span>the loyal</span></button>
      </div>
      <button class="house hatpick" data-house="hat" id="hatpick">Let the Hat decide…</button>
    </div>
  </div>
  <div id="langpick">
    <div>
      <div class="crest">⚡</div>
      <p class="lq">Choose your language &nbsp;·&nbsp; Dilinizi seçin</p>
      <div class="langs">
        <button data-lang="en">English</button>
        <button data-lang="az">Azərbaycanca</button>
      </div>
    </div>
  </div>
</div>
